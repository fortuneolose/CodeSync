databases:
  - name: codesync-db
    databaseName: codesync
    user: codesync
    plan: free

services:
  # ── Backend (FastAPI) ──────────────────────────────────────────────────────
  - type: web
    name: codesync-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codesync-db
          property: connectionString
      - key: REDIS_URL
        sync: false          # Set this to your Upstash Redis URL in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false          # Paste your OpenAI key in the Render dashboard
      - key: CORS_ORIGINS
        value: '["https://codesync-frontend-a3kj.onrender.com"]'
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: "3.12.0"

  # ── Frontend (React static site) ──────────────────────────────────────────
  - type: web
    name: codesync-frontend
    env: static
    buildCommand: cd frontend && npm ci && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: "/*"
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://codesync-api-ho8l.onrender.com/api
      - key: VITE_WS_URL
        value: wss://codesync-api-ho8l.onrender.com/ws
